<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayHealthy | Sign Up</title>
    <link rel="stylesheet" href="./Sign_Up.css" />
  </head>

  <body>
    <main class="page">
      <section class="auth-card">
        <h1 class="auth-title">Sign Up</h1>

        <p class="auth-subtitle">
          Already a member?
          <a href="../Login/Login.html" class="auth-link">Login</a>
        </p>

        <form class="auth-form" action="#" method="post" novalidate>

          <!-- Role -->
          <div class="field">
            <label class="label" for="role">Role</label>
            <div class="select-wrapper">
              <select id="role" name="role" class="input select">
                <option value="" disabled selected>Select role</option>
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
              </select>
            </div>
          </div>

          <!-- Name -->
          <div class="field">
            <label class="label" for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="input"
              placeholder="Enter your name"
            />
          </div>

          <!-- Phone -->
          <div class="field">
            <label class="label" for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              class="input"
              placeholder="Enter your phone number"
            />
          </div>

          <!-- Email -->
          <div class="field">
            <label class="label" for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="input"
              placeholder="Enter your email address"
            />
            <p class="error">Please provide a valid email address</p>
          </div>

          <!-- Password -->
          <div class="field">
            <label class="label" for="password">Password</label>
            <div class="input-with-icon">
              <input
                type="password"
                id="password"
                name="password"
                class="input input--with-icon"
                placeholder="Enter your password"
              />
              <button type="button" class="icon-btn" aria-label="Toggle password visibility">
                <svg width="18" height="18" viewBox="0 0 24 24">
                  <path
                    d="M12 5c5.5 0 9.5 5.2 10.6 6.9.2.3.2.9 0 1.2C21.5 14.8 17.5 20 12 20S2.5 14.8 1.4 13.1a1.2 1.2 0 0 1 0-1.2C2.5 10.2 6.5 5 12 5z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Buttons -->
          <div class="actions">
            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-danger">Reset</button>
          </div>

          <p class="error error--center">Email already registered.</p>

        </form>
      </section>
    </main>
  </body>
</html>

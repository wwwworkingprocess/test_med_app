<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StayHealthy - Navbar</title>

  <link rel="stylesheet" href="./Navbar.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
</head>

<body>
  <nav class="nav" aria-label="Primary navigation">
    <a class="nav__brand" href="./Landing_Page/LandingPage.html" aria-label="StayHealthy Home">
      <span class="nav__brandIcon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" height="26" width="26" viewBox="0 0 1000 1000">
          <g>
            <path d="M499.8,10c91.7,0,166,74.3,166,166c0,91.7-74.3,166-166,166c-91.7,0-166-74.3-166-166C333.8,84.3,408.1,10,499.8,10z"></path>
            <path d="M499.8,522.8c71.2,0,129.1-58.7,129.1-129.1H370.6C370.6,464.1,428.6,522.8,499.8,522.8z"></path>
            <path d="M693.2,395c-0.7,94.9-70.3,173.7-160.8,188.9v155.9c0,80.3-60.7,150.8-140.8,155.3c-83,4.7-152.7-58.9-157.6-139.7c-22-12.8-35.6-38.5-30.3-66.7c4.7-25.1,25.5-45.6,50.8-49.9c39.7-6.7,74.1,23.7,74.1,62.1c0,23-12.3,43-30.7,54.1c4.7,45.4,45.1,80.4,92.6,76c44.6-4,77.2-44.0,77.2-88.0V580.4c-90.2-15.8-158.6-94.1-158.6-188.0l0-19.8h49.6v19.8c0,77.1,62.6,139.7,139.7,139.7c77.1,0,139.7-62.6,139.7-139.7v-19.8h49.6V395z"></path>
          </g>
        </svg>
      </span>
      <span class="nav__brandText">StayHealthy</span>
    </a>

    <button class="nav__toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
      <i class="fa fa-bars" aria-hidden="true"></i>
    </button>

    <ul class="nav__links" id="primaryNav">
      <li class="nav__item"><a class="nav__link" href="#">Home</a></li>
      <li class="nav__item"><a class="nav__link" href="#">Appointments</a></li>
    </ul>

    <div class="nav__actions">
      <a class="btn btn--outline" href="./Sign_Up/Sign_Up.html">Sign Up</a>
      <a class="btn btn--primary" href="./Login/Login.html">Login</a>
    </div>
  </nav>

  <script>
    const toggleBtn = document.querySelector(".nav__toggle");
    const links = document.querySelector(".nav__links");
    const actions = document.querySelector(".nav__actions");
    const icon = toggleBtn.querySelector("i");

    toggleBtn.addEventListener("click", () => {
      const isOpen = links.classList.toggle("is-open");
      actions.classList.toggle("is-open", isOpen);
      toggleBtn.setAttribute("aria-expanded", String(isOpen));
      icon.classList.toggle("fa-bars", !isOpen);
      icon.classList.toggle("fa-times", isOpen);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StayHealthy | Login</title>
    <link rel="stylesheet" href="./Login.css" />
  </head>

  <body>
    <main class="page">
      <section class="auth-card" aria-label="Login form">
        <h1 class="auth-title">Login</h1>

        <p class="auth-subtitle">
          Are you a new member?
          <a class="auth-link" href="../Sign_Up/Sign_Up.html">Sign Up Here</a>
        </p>

        <form class="auth-form" action="#" method="post" novalidate>
          <div class="field">
            <label class="label" for="email">Email</label>
            <input
              class="input"
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email address"
              autocomplete="email"
            />
            <!-- show this only when invalid (later in React) -->
            <p class="error">Please provide a valid email address</p>
          </div>

          <div class="field">
            <label class="label" for="password">Password</label>

            <div class="input-with-icon">
              <input
                class="input input--with-icon"
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <!-- purely visual for now -->
              <button class="icon-btn" type="button" aria-label="Toggle password visibility">
                <!-- simple eye icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 5c5.5 0 9.5 5.2 10.6 6.9.2.3.2.9 0 1.2C21.5 14.8 17.5 20 12 20S2.5 14.8 1.4 13.1a1.2 1.2 0 0 1 0-1.2C2.5 10.2 6.5 5 12 5zm0 3.2A3.8 3.8 0 1 0 12 16a3.8 3.8 0 0 0 0-7.6zm0 2a1.8 1.8 0 1 1 0 3.6 1.8 1.8 0 0 1 0-3.6z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="actions">
            <button class="btn btn-primary" type="submit">Submit</button>
            <button class="btn btn-danger" type="reset">Reset</button>
          </div>

          <!-- show this only when auth fails (later in React) -->
          <p class="error error--center">Invalid email or address provided</p>

          <p class="auth-footer">
            <a class="auth-link" href="#">Forgot your password?</a>
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
